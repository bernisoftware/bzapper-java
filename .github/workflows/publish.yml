# Publica com.bernisoftware:bzapper no Maven Central (Sonatype Central Portal) ao
# dar push de uma tag vX.Y.Z no repo bernisoftware/bzapper-java.
# É o ecossistema que exige MAIS setup (ver clients/PUBLISHING.md):
#   - conta no Central Portal (central.sonatype.com) + namespace com.bernisoftware verificado
#   - chave GPG (assinatura obrigatória)
#   - o pom.xml precisa do central-publishing-maven-plugin no profile `release`
# Secrets: MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD, MAVEN_GPG_PRIVATE_KEY, MAVEN_GPG_PASSPHRASE
name: publish
on:
  push:
    tags: ['v*']
jobs:
  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - run: mvn --batch-mode --no-transfer-progress clean deploy -P release
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
